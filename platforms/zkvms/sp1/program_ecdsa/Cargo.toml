[package]
name = "ecdsa_verify_program"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ecdsa_verify"
path = "src/main.rs"

[dependencies]
sp1-zkvm = "6.0.1"
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
bincode = "1.3"
# k256 0.13.x — SP1-patched at workspace root. Routes secp256k1 curve
# operations through SECP256K1_ADD / SECP256K1_DOUBLE / SECP256K1_DECOMPRESS,
# and the SHA-256 digest through SHA_COMPRESS / SHA_EXTEND when the
# host hashes with sha2 v0.10.x.
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "sha256"] }
