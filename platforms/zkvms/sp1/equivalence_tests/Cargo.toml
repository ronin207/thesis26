[package]
name = "sp1_equivalence_tests"
version = "0.1.0"
edition = "2021"
publish = false

# Host-side cross-codebase tests that exercise the patched SP1 fork
# against the vc-pqc reference. No SP1 guest build (no build.rs), so
# tests run with stock stable rustc — no `+succinct` toolchain
# required. Sibling to `script/`, which has a `build.rs` and is the
# wrong place for these tests for that reason.

[lib]
path = "src/lib.rs"

[dependencies]
vc-pqc = { path = "../../../.." }
sp1-core-executor = "6.0.1"

[dev-dependencies]
# Deterministic randomness for the property test — `rand_chacha`
# keeps the random vectors reproducible across runs so a CI failure
# can be re-played locally without flake.
rand = "0.8"
rand_chacha = "0.3"
