[package]
name = "bdec_cregen_program"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bdec_cregen"
path = "src/main.rs"

[dependencies]
sp1-zkvm = "6.0.1"
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
bincode = "1.3"
# PLUM uses std::collections; Loquat side ignored here.
vc-pqc = { path = "../../../..", default-features = false, features = ["guest", "std", "sp1"] }

[features]
default = []
# A/B switch (mirrors program/Cargo.toml): disable ONLY the Griffin
# permutation syscall, falling back to rv32im-emulated Griffin while
# holding UINT256_MUL on in both arms. Isolates the Griffin precompile's
# contribution at the 2-verification CreGen level.
griffin-emulated = ["vc-pqc/sp1-no-griffin-syscall"]
