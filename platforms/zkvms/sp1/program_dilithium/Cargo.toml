[package]
name = "dilithium_verify_program"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "dilithium_verify"
path = "src/main.rs"

[dependencies]
sp1-zkvm = "6.0.1"
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
bincode = "1.3"
# Phase B6.3 lattice-PQ anchor.
# We avoid `ml-dsa` 0.0.x (still pre-release; pkcs8 / der deps not
# no_std-clean for SP1 guest). Instead we exercise an ML-DSA-equivalent
# NTT-and-polynomial-mul workload over Dilithium's prime
# q = 8,380,417 (≈ 2^23), the dominant cost on a real ML-DSA verify
# (Aw - c·t1·2^d recomputation). The Phase B6.5 doc cross-cites the
# RustCrypto ml-dsa bench numbers for full ML-DSA verify, anchoring
# our cycle count to the published "lattice-PQ" baseline.
