[package]
name = "plum_verify_script"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "plum_host"
path = "src/bin/plum_host.rs"

[[bin]]
name = "griffin_smoke_host"
path = "src/bin/griffin_smoke_host.rs"

[dependencies]
sp1-sdk = { version = "6.0.1", default-features = false, features = ["blocking"] }
sp1-core-executor = "6.0.1"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
rand = "0.8"
rand_chacha = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
vc-pqc = { path = "../../../.." }

[build-dependencies]
sp1-build = "6.0.1"
