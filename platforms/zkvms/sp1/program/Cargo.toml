[package]
name = "plum_verify_program"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "plum_verify"
path = "src/main.rs"

[dependencies]
sp1-zkvm = "6.0.1"
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
bincode = "1.3"
# vc-pqc: PLUM uses std::collections; Loquat side ignored here.
vc-pqc = { path = "../../../..", default-features = false, features = ["guest", "std", "sp1"] }

[features]
default = []
# Phase 3f A/B switch: disable ONLY the Griffin-permutation syscall
# route in the guest, falling back to rv32im-emulated Griffin. Lets
# us measure the cycle delta of the Griffin precompile while holding
# the `UINT256_MUL` precompile on in both arms (clean isolation of
# Griffin's contribution). See `../script/src/bin/plum_host.rs` for
# the comparison harness.
griffin-emulated = ["vc-pqc/sp1-no-griffin-syscall"]
# Cell 3 (PLUM-SHA3): swap the guest's PLUM hasher from
# `PlumGriffinHasher` to `PlumSha3Hasher`. The Griffin precompile
# becomes irrelevant on this arm; SHA3-256 runs in software (no
# native SHA precompile in SP1 v6.2.1, so this is the "any hash, no
# bespoke precompile" baseline). Isolates whether Cell 2's win is
# Griffin-specific or any-precompile.
plum-sha3-hasher = []
