[package]
name = "zkvm_risc0"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
# `std` enabled so the PLUM guest binary can use `std::collections::*`
# transitively via the PLUM modules (Loquat is no_std and ignores it).
risc0-zkvm = { version = "^3.0.3", default-features = false, features = ["std"] }
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
sha2 = { version = "0.10", default-features = false }
bincode = "1.3"
# vc-pqc: keep both "guest" (Loquat side) and "std" (PLUM side
# needs std::collections for HashMap/HashSet in plum::*).
vc-pqc = { path = "../../../../..", default-features = false, features = ["guest", "std", "risc0"] }

# PLUM guest binary (Phase 10 — runs plum_verify inside risc0 and
# commits the cycle-attribution counters). SHA3-256 hasher variant.
[[bin]]
name = "plum_verify"
path = "src/bin/plum_verify.rs"

# Griffin-hasher variant of the same binary (Phase 11). The host
# runs both back-to-back to compare three-level attribution.
[[bin]]
name = "plum_verify_griffin"
path = "src/bin/plum_verify_griffin.rs"

# BDEC CreGen statement (ProSec 2024 §3) — PLUM-Griffin instantiation.
# Beachhead for PLUM-in-BDEC × RISC0. Runs two plum_verify calls under
# a shared (witness-only) pk_U, mirroring the formal CreGen relation.
[[bin]]
name = "bdec_credgen_plum_griffin"
path = "src/bin/bdec_credgen_plum_griffin.rs"

# BDEC ShowCre statement (ProSec 2024 §4.1) — PLUM-Griffin instantiation.
# The k+2 generalisation of CreGen: k pseudonym-ownership checks + one
# verifier-facing pseudonym check + one shown-credential check, all under a
# shared (witness-only) pk_U. phi is checked verifier-side, not in-circuit.
[[bin]]
name = "bdec_showcre_plum_griffin"
path = "src/bin/bdec_showcre_plum_griffin.rs"
